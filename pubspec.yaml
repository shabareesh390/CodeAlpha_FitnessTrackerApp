name: flutter_daily_fitness_app_ui
description: Premium Fitness Tracker - Track workouts, nutrition, and achieve your goals.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.2

  # Firebase (existing)
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.68.0

  # Animations
  lottie: ^3.3.1
  animations: ^2.0.11
  confetti: ^0.8.0
  flutter_staggered_animations: ^1.1.1

  # UI Components
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # Utilities
  google_generative_ai: any
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.jpg"
  image_path: "assets/icon/app_icon.jpg"
  min_sdk_android: 21

dependency_overrides:
  archive: ^4.0.9
